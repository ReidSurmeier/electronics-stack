# Pin alias groups for datasheet_pinmatch.
# Each group is a list of signal names considered functionally equivalent.
# Names are matched case-insensitively after stripping non-alphanumeric chars.

power:
  - VCC
  - VDD
  - V+
  - AVCC
  - AVDD
  - DVCC
  - DVDD
  - IOVDD
  - VBAT
  - VIN
  - VDDA
  - VDDD
  - VDDIO
  - VCC3V3
  - VCC5V
  - VCC33
  - VCCA
  - VCCD
  - VCCIO
  - VPP

ground:
  - GND
  - VSS
  - AVSS
  - DVSS
  - GNDA
  - GNDD
  - AGND
  - DGND
  - PGND
  - SGND
  - VSSA
  - COM
  - EP
  - EPAD

clock_serial:
  - SCL
  - SCLK
  - SCK
  - CLK
  - CLOCK
  - I2C_CLK
  - SPI_CLK
  - SPCLK
  - SPICLK
  - SCKL
  - BCLK
  - MCLK
  - DCLK
  - SCLK1
  - SCL1

data_serial_mosi:
  - MOSI
  - SDI
  - DIN
  - SDIN
  - SI
  - SDA_MOSI
  - MOSI1

data_serial_miso:
